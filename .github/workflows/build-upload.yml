name: CI
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
jobs:
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run make
        run: npm install && make

      - name: Upload static files as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .generated